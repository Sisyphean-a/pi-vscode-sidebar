name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality-gates:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify (unit + lint + typecheck)
        run: npm run verify

      - name: Run E2E
        run: npm run test:e2e

      - name: Run performance gates
        run: npm run test:perf

      - name: Build extension bundle
        run: npm run build
